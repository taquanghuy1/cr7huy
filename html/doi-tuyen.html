<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Thi Đấu - Sports Hub</title>
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-card: rgba(22, 27, 34, 0.7);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --accent: #238636;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.6; }
        header { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); padding: 25px 20px; text-align: center; }
        header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(45deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { background: rgba(22, 27, 34, 0.5); padding: 15px; text-align: center; border-bottom: 1px solid var(--border-card); backdrop-filter: blur(10px); }
        nav ul { list-style: none; }
        nav ul li { display: inline; margin: 0 15px; }
        nav ul li a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
        nav ul li a:hover { color: var(--primary); }
        
        .page-title { text-align: center; margin-top: 30px; font-weight: 800; }
        .page-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        
        /* Bộ lọc vòng đấu */
        .filter-container { margin-bottom: 25px; text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 0 10px; }
        .filter-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-card); color: var(--text-muted); padding: 8px 16px; border-radius: 30px; font-size: 13px; transition: 0.3s; cursor: pointer; font-weight: 600; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: #fff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); border-color: transparent; }
        
        /* Danh sách trận đấu */
        .match-container { max-width: 800px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .match-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 15px 20px; transition: 0.3s; }
        .match-card:hover { transform: translateY(-2px); border-color: rgba(88, 166, 255, 0.3); }
        .match-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 12px; }
        
        /* Khu vực hiển thị tỷ số / đội bóng */
        .match-core { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team-flag { font-size: 32px; }
        .team-name { font-size: 15px; font-weight: 700; color: #fff; }
        
        .score-zone { flex: 0 0 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .vs-text { font-size: 13px; font-weight: 800; color: var(--primary); background: rgba(88, 166, 255, 0.1); padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(88, 166, 255, 0.2); }
        .stadium-info { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; width: 100%; font-style: italic; }
        
        .hide { display: none !important; }
        footer { text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 40px; padding: 20px; border-top: 1px solid var(--border-card); }
    </style>
</head>
<body>

    <header>
        <h1>SPORTS HUB PREMIUM</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">🏠 Trang Chủ</a></li>
            <li><a href="lich-thi-dau.html" style="color: #58a6ff;">📅 Lịch Thi Đấu</a></li>
            <li><a href="san-van-dong.html">🏟️ Sân Vận Động</a></li>
            <li><a href="doi-tuyen.html">⚽ Đội Tuyển</a></li>
        </ul>
    </nav>

    <div>
        <h2 class="page-title">📅 LỊCH THI ĐẤU TOÀN DIỆN 48 ĐỘI</h2>
        <p class="page-subtitle">Hệ thống phân chia 12 bảng đấu chính thức đầy đủ quốc kỳ</p>

        <!-- Bộ lọc vòng đấu -->
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterStage('all')">Tất Cả Các Trận (24)</button>
            <button class="filter-btn" onclick="filterStage('all-group')">Vòng Bảng (A - L)</button>
            <button class="filter-btn" onclick="filterStage('knockout')">Vòng Loại Trực Tiếp</button>
        </div>

        <div class="match-container" id="matchContainer">
            <!-- Trận đấu có đủ cờ 48 quốc gia tự động sinh ra ở đây -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Sports Hub Premium UI - Hệ thống Thể thao số</p>
    </footer>

    <script>
        // Mảng chứa toàn bộ 48 đội tuyển chia thành các cặp đối đầu trực tiếp ở vòng bảng và vòng loại
        const matchesData = [
            // BẢNG A -> D
            { stage: "all-group", group: "Bảng A", date: "12/06", team1: "Hoa Kỳ", flag1: "🇺🇸", team2: "Ma-rốc", flag2: "🇲🇦", stadium: "SoFi Stadium" },
            { stage: "all-group", group: "Bảng A", date: "12/06", team1: "Mexico", flag1: "🇲🇽", team2: "New Zealand", flag2: "🇳🇿", stadium: "Azteca Stadium" },
            { stage: "all-group", group: "Bảng B", date: "13/06", team1: "Argentina", flag1: "🇦🇷", team2: "Thổ Nhĩ Kỳ", flag2: "🇹🇷", stadium: "MetLife Stadium" },
            { stage: "all-group", group: "Bảng B", date: "13/06", team1: "Nhật Bản", flag1: "🇯🇵", team2: "Ghana", flag2: "🇬🇭", stadium: "Hard Rock Stadium" },
            { stage: "all-group", group: "Bảng C", date: "14/06", team1: "Pháp", flag1: "🇫🇷", team2: "Hàn Quốc", flag2: "🇰🇷", stadium: "BC Place" },
            { stage: "all-group", group: "Bảng C", date: "14/06", team1: "Úc", flag1: "🇦🇺", team2: "Ecuador", flag2: "🇪🇨", stadium: "AT&T Stadium" },
            { stage: "all-group", group: "Bảng D", date: "15/06", team1: "Anh", flag1: "🏴\u200D󠁢󠁥󠁮󠁧U+E007F", team2: "Ai Cập", flag2: "🇪🇬", stadium: "Mercedes-Benz Stadium" },
            { stage: "all-group", group: "Bảng D", date: "15/06", team1: "Nigeria", flag1: "🇳🇬", team2: "Áo", flag2: "🇦🇹", stadium: "Lumen Field" },

            // BẢNG E -> H
            { stage: "all-group", group: "Bảng E", date: "16/06", team1: "Tây Ban Nha", flag1: "🇪🇸", team2: "Ả Rập Xê Út", flag2: "🇸🇦", stadium: "Levi's Stadium" },
            { stage: "all-group", group: "Bảng E", date: "16/06", team1: "Algeria", flag1: "🇩🇿", team2: "Ba Lan", flag2: "🇵🇱", stadium: "Gillette Stadium" },
            { stage: "all-group", group: "Bảng F", date: "17/06", team1: "Brazil", flag1: "🇧🇷", team2: "Ý", flag2: "🇮🇹", stadium: "Lincoln Financial Field" },
            { stage: "all-group", group: "Bảng F", date: "17/06", team1: "Tunisia", flag1: "🇹🇳", team2: "Hungary", flag2: "🇭🇺", stadium: "NRG Stadium" },
            { stage: "all-group", group: "Bảng G", date: "18/06", team1: "Bồ Đào Nha", flag1: "🇵🇹", team2: "Iraq", flag2: "🇮🇶", stadium: "Arrowhead Stadium" },
            { stage: "all-group", group: "Bảng G", date: "18/06", team1: "Nam Phi", flag1: "🇿🇦", team2: "Đan Mạch", flag2: "🇩🇰", stadium: "Allianz Field" },
            { stage: "all-group", group: "Bảng H", date: "19/06", team1: "Hà Lan", flag1: "🇳🇱", team2: "Uzbekistan", flag2: "🇺🇿", stadium: "Hard Rock Stadium" },
            { stage: "all-group", group: "Bảng H", date: "19/06", team1: "Cameroon", flag1: "🇨🇲", team2: "Thụy Sĩ", flag2: "🇨🇭", stadium: "SoFi Stadium" },

            // BẢNG I -> L (Đủ toàn bộ 48 đội tuyển phối hợp)
            { stage: "all-group", group: "Bảng I", date: "20/06", team1: "Bỉ", flag1: "🇧🇪", team2: "Qatar", flag2: "🇶🇦", stadium: "MetLife Stadium" },
            { stage: "all-group", group: "Bảng I", date: "20/06", team1: "Bờ Biển Ngà", flag1: "🇨🇮", team2: "Ukraina", flag2: "🇺🇦", stadium: "Azteca Stadium" },
            { stage: "all-group", group: "Bảng J", date: "21/06", team1: "Croatia", flag1: "🇭🇷", team2: "Iran", flag2: "🇮🇷", stadium: "BC Place" },
            { stage: "all-group", group: "Bảng J", date: "21/06", team1: "Uruguay", flag1: "🇺🇾", team2: "Canada", flag2: "🇨🇦", stadium: "Lumen Field" },
            { stage: "all-group", group: "Bảng K", date: "22/06", team1: "Colombia", flag1: "🇨🇴", team2: "Panama", flag2: "🇵🇦", stadium: "AT&T Stadium" },
            { stage: "all-group", group: "Bảng K", date: "22/06", team1: "Costa Rica", flag1: "🇨🇷", team2: "Paraguay", flag2: "🇵🇾", stadium: "Levi's Stadium" },
            { stage: "all-group", group: "Bảng L", date: "23/06", team1: "Chile", flag1: "🇨🇱", team2: "Jamaica", flag2: "🇯🇲", stadium: "Gillette Stadium" },
            { stage: "all-group", group: "Bảng L", date: "23/06", team1: "Senegal", flag1: "🇸🇳", team2: "Hà Lan", flag2: "🇳🇱", stadium: "NRG Stadium" },

            // VÒNG LOẠI TRỰC TIẾP CHUNG KẾT TRONG MƠ
            { stage: "knockout", group: "Trận Chung Kết Trong Mơ 🏆", date: "19/07 - 02:00", team1: "Argentina", flag1: "🇦🇷", team2: "Pháp", flag2: "🇫🇷", stadium: "MetLife Stadium (New York)" }
        ];

        function renderMatches() {
            const container = document.getElementById('matchContainer');
            container.innerHTML = "";

            matchesData.forEach(match => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.setAttribute('data-stage', match.stage);

                card.innerHTML = `
                    <div class="match-meta">
                        <span>${match.group}</span>
                        <span style="color: var(--primary);">${match.date}</span>
                    </div>
                    <div class="match-core">
                        <div class="team">
                            <span class="team-flag">${match.flag1}</span>
                            <span class="team-name">${match.team1}</span>
                        </div>
                        <div class="score-zone">
                            <span class="vs-text">VS</span>
                        </div>
                        <div class="team">
                            <span class="team-flag">${match.flag2}</span>
                            <span class="team-name">${match.team2}</span>
                        </div>
                    </div>
                    <div class="stadium-info">📍 Sân vận động: ${match.stadium}</div>
                `;
                container.appendChild(card);
            });
        }

        function filterStage(stageName) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const cards = document.querySelectorAll('.match-card');
            cards.forEach(card => {
                // Nếu chọn 'all' thì hiện tất cả, chọn 'all-group' thì hiện các trận vòng bảng
                if (stageName === 'all' || card.getAttribute('data-stage') === stageName || (stageName === 'all-group' && card.getAttribute('data-stage') === 'all-group')) {
                    card.classList.remove('hide');
                } else {
                    card.classList.add('hide');
                }
            });
        }

        renderMatches();
    </script>
</body>
</html>
